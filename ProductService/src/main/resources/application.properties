spring.application.name=productservice
# Active Profile: 'db' for database implementation, 'fakestore' for external API
spring.profiles.active=db
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/productdb
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.show-sql= true
#For connecting to Authorization Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181

#spring.log.level.com.example.productservice=TRACE
logging.level.org.springframework.security.*=TRACE
logging.level.org.springframework.web.*=TRACE